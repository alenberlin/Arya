name: build-arya-api

# Builds and publishes the Arya API container image. A per-commit immutable
# tag is recorded so a deployment always pins an exact, reproducible source.
on:
  push:
    branches: [main]
    paths: ["arya-api/**"]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: arya-api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/arya-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/arya-api:staging
          build-args: |
            GIT_SHA=${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
