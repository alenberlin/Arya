name: release-macos

# Builds, signs, and notarizes the macOS DMG and publishes it plus the
# signed update manifest to the public releases repo. Manual dispatch; the
# secrets below must be configured before the first real release.
on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        type: choice
        options: [stable, rc]
        default: rc

jobs:
  build:
    runs-on: macos-14
    env:
      # Public hosted endpoints baked into the desktop binary. These are
      # repository/environment variables, not secrets.
      ARYA_API_URL: ${{ vars.ARYA_API_URL }}
      ARYA_CLERK_SIGN_IN_URL: ${{ vars.ARYA_CLERK_SIGN_IN_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter arya-sidecar build

      # Guard: no provider key may ship in the desktop bundle.
      - run: node scripts/scan-keys.mjs

      # Guard: the rc channel overlays an extra Tauri config via --config; fail
      # early with a clear message if it is missing rather than deep in the build.
      - name: Validate channel config
        run: |
          if [ "${{ github.event.inputs.channel }}" = "rc" ] && [ ! -f src-tauri/tauri.rc.conf.json ]; then
            echo "::error::rc channel requires src-tauri/tauri.rc.conf.json (missing)"; exit 1
          fi

      # Guard: a production/RC desktop build must not silently fall back to
      # local mode because the public hosted endpoints were omitted.
      - name: Validate hosted release config
        run: |
          missing=0
          for var in ARYA_API_URL ARYA_CLERK_SIGN_IN_URL; do
            if [ -z "${!var:-}" ]; then
              echo "::error::$var must be configured as a GitHub Actions variable"; missing=1
            fi
          done
          exit "$missing"

      - name: Build, sign, notarize
        uses: tauri-apps/tauri-action@v0
        env:
          # Apple Developer ID signing + notarization.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Ed25519 key for signing the auto-update manifest.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # The releases repo is separate and public so the unauthenticated
          # updater GET succeeds even while this repo is private.
          releaseDraft: false
          tagName: ${{ github.event.inputs.channel == 'stable' && 'v__VERSION__' || 'rc' }}
          args: ${{ github.event.inputs.channel == 'stable' && '' || '--config src-tauri/tauri.rc.conf.json' }}
